<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetQuiz — Networking Fundamentals</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --accent: #5b8cff;
    --accent2: #38e5a0;
    --danger: #ff5c6a;
    --warn: #ffb547;
    --text: #e8eaf0;
    --muted: #6b7390;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 16px; line-height: 1.6; min-height: 100vh; }

  /* BG grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* ---- SCREENS ---- */
  .screen { display: none; position: relative; z-index: 1; }
  .screen.active { display: block; }

  /* ---- HOME ---- */
  #home {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  .home-badge {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 2rem;
    display: inline-block;
  }
  .home-title {
    font-family: var(--mono);
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 1rem;
  }
  .home-title span { color: var(--accent); }
  .home-sub {
    font-size: 1.1rem;
    color: var(--muted);
    max-width: 480px;
    margin: 0 auto 3rem;
  }
  .module-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
    max-width: 720px;
    width: 100%;
    margin-bottom: 2.5rem;
  }
  .mod-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    cursor: pointer;
    transition: all .2s;
    text-align: center;
  }
  .mod-card:hover { border-color: var(--accent); transform: translateY(-2px); background: var(--surface2); }
  .mod-card.selected { border-color: var(--accent); background: rgba(91,140,255,0.1); }
  .mod-card.all-card { grid-column: 1 / -1; }
  .mod-num { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-bottom: 4px; }
  .mod-label { font-size: 13px; color: var(--text); font-weight: 500; }
  .mod-count { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .start-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 14px 48px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
  }
  .start-btn:hover { background: #7aa5ff; transform: translateY(-1px); }

  /* ---- QUIZ ---- */
  #quiz { min-height: 100vh; padding: 0; }

  .quiz-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .quiz-header-left { display: flex; align-items: center; gap: 12px; flex: 1; }
  .q-counter { font-family: var(--mono); font-size: 13px; color: var(--muted); white-space: nowrap; }
  .progress-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }
  .skip-badge {
    font-family: var(--mono); font-size: 11px; color: var(--warn);
    border: 1px solid var(--warn); border-radius: 20px;
    padding: 3px 10px; white-space: nowrap;
  }
  .header-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .header-btn:hover { border-color: var(--accent); color: var(--accent); }

  .quiz-body { max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }

  .q-module-tag {
    font-family: var(--mono); font-size: 11px; color: var(--accent);
    letter-spacing: 2px; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 8px;
  }
  .q-module-tag::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .q-skipped-tag { font-family: var(--mono); font-size: 11px; color: var(--warn); margin-bottom: .5rem; }

  .q-text {
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 2rem;
  }
  .multi-hint { font-size: 12px; color: var(--warn); font-family: var(--mono); margin-top: -1.5rem; margin-bottom: 1.5rem; }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all .18s;
    text-align: left;
    width: 100%;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(91,140,255,0.07); }
  .choice-btn.selected { border-color: var(--accent); background: rgba(91,140,255,0.12); }
  .choice-btn.correct { border-color: var(--accent2); background: rgba(56,229,160,0.1); color: var(--accent2); }
  .choice-btn.wrong { border-color: var(--danger); background: rgba(255,92,106,0.1); color: var(--danger); }
  .choice-btn.reveal { border-color: var(--accent2); background: rgba(56,229,160,0.07); color: var(--accent2); }
  .choice-btn:disabled { cursor: default; }
  .choice-letter {
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    min-width: 22px; padding-top: 2px;
    color: var(--muted);
  }
  .choice-btn.selected .choice-letter { color: var(--accent); }
  .choice-btn.correct .choice-letter { color: var(--accent2); }
  .choice-btn.wrong .choice-letter { color: var(--danger); }
  .choice-btn.reveal .choice-letter { color: var(--accent2); }

  .feedback-box {
    margin-top: 1.25rem;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-family: var(--mono);
    animation: fadeUp .2s ease;
  }
  .feedback-box.correct { background: rgba(56,229,160,0.1); border: 1px solid var(--accent2); color: var(--accent2); }
  .feedback-box.wrong { background: rgba(255,92,106,0.1); border: 1px solid var(--danger); color: var(--danger); }

  .q-actions { display: flex; gap: 12px; margin-top: 2rem; flex-wrap: wrap; }
  .q-btn {
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    padding: 12px 28px; border-radius: 8px; cursor: pointer;
    border: 1px solid; transition: all .2s; letter-spacing: .5px;
  }
  .q-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .q-btn.primary:hover { background: #7aa5ff; }
  .q-btn.secondary { background: transparent; color: var(--muted); border-color: var(--border); }
  .q-btn.secondary:hover { border-color: var(--warn); color: var(--warn); }
  .q-btn.skip { background: transparent; color: var(--warn); border-color: var(--warn); }
  .q-btn.skip:hover { background: rgba(255,181,71,0.1); }

  /* skipped queue panel */
  .skipped-panel {
    background: var(--surface);
    border: 1px solid var(--warn);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 2rem;
    animation: fadeUp .3s ease;
  }
  .skipped-panel h3 { font-family: var(--mono); font-size: 12px; color: var(--warn); margin-bottom: 10px; letter-spacing: 2px; }
  .skipped-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .skipped-item {
    font-family: var(--mono); font-size: 11px;
    background: rgba(255,181,71,0.1);
    border: 1px solid var(--warn);
    color: var(--warn);
    padding: 4px 10px; border-radius: 4px;
    cursor: pointer; transition: all .15s;
  }
  .skipped-item:hover { background: rgba(255,181,71,0.2); }

  /* ---- RESULTS ---- */
  #results { min-height: 100vh; padding: 3rem 1.5rem; }
  .results-wrap { max-width: 900px; margin: 0 auto; }
  .results-header { text-align: center; margin-bottom: 3rem; }
  .results-title { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 3px; margin-bottom: 1rem; }
  .results-score-big { font-family: var(--mono); font-size: clamp(4rem, 15vw, 8rem); font-weight: 700; line-height: 1; margin-bottom: .5rem; }
  .results-pct { font-size: 1.1rem; color: var(--muted); margin-bottom: 2rem; }
  .score-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 3rem; max-width: 600px; margin-left: auto; margin-right: auto; }
  .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; text-align: center; }
  .score-card-num { font-family: var(--mono); font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
  .score-card-lbl { font-size: 12px; color: var(--muted); }
  .score-card.correct .score-card-num { color: var(--accent2); }
  .score-card.wrong .score-card-num { color: var(--danger); }
  .score-card.skipped .score-card-num { color: var(--warn); }

  .results-section-title {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    letter-spacing: 2px; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 10px;
  }
  .results-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .review-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 3rem; }
  .review-card {
    background: var(--surface);
    border-radius: 10px;
    padding: 20px 22px;
    border-left: 3px solid var(--border);
  }
  .review-card.wrong-card { border-left-color: var(--danger); }
  .review-card.skipped-card { border-left-color: var(--warn); }
  .review-qnum { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .review-q { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
  .review-your { font-size: 13px; color: var(--danger); margin-bottom: 4px; }
  .review-correct { font-size: 13px; color: var(--accent2); }
  .review-skipped-label { font-size: 13px; color: var(--warn); font-family: var(--mono); }

  .results-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 2rem; }
  .res-btn {
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    padding: 12px 28px; border-radius: 8px; cursor: pointer;
    border: 1px solid; transition: all .2s; letter-spacing: .5px;
  }
  .res-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .res-btn.primary:hover { background: #7aa5ff; }
  .res-btn.secondary { background: transparent; color: var(--muted); border-color: var(--border); }
  .res-btn.secondary:hover { border-color: var(--text); color: var(--text); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .fade-in { animation: fadeUp .3s ease; }

  /* module filter row */
  .mod-filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 2.5rem; }
  .mf-btn {
    font-family: var(--mono); font-size: 11px;
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; transition: all .15s;
  }
  .mf-btn.active { border-color: var(--danger); color: var(--danger); background: rgba(255,92,106,0.08); }
  .mf-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 500px) {
    .quiz-header { flex-wrap: wrap; }
    .q-text { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-badge">NETWORKING FUNDAMENTALS</div>
  <h1 class="home-title">NET<span>QUIZ</span></h1>
  <p class="home-sub">Practice all modules from your course material. Skip hard questions and come back later.</p>
  <div class="module-grid" id="moduleGrid"></div>
  <button class="start-btn" onclick="startQuiz()">START QUIZ →</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-header-left">
      <span class="q-counter" id="qCounter">0 / 0</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="skip-badge" id="skipBadge" style="display:none">0 skipped</span>
    </div>
    <button class="header-btn" onclick="goToResults()">FINISH & SCORE</button>
    <button class="header-btn" onclick="goHome()">EXIT</button>
  </div>
  <div class="quiz-body" id="quizBody"></div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="results-wrap" id="resultsWrap"></div>
</div>

<script>
const LETTERS = ['A','B','C','D','E','F'];

const MOD_NAMES = {
  1:'Intro to Networks', 2:'IOS & Protocols', 3:'Comm Standards',
  4:'Physical Layer', 5:'IP Addressing', 6:'Data Link Layer',
  7:'Ethernet', 8:'Network Layer', 9:'ARP & Switching',
  10:'Router Config', 11:'Subnetting', 12:'IPv6',
  13:'ICMP & Ping', 14:'Transport Layer', 15:'App Layer',
  16:'Security', 17:'Small Networks', 0:'Checkpoint'
};

const ALL_Q = [
{m:1,q:"How does BYOD change the way in which businesses implement networks?",c:["BYOD requires organizations to purchase laptops rather than desktops.","BYOD users are responsible for their own network security, reducing the need for security policies.","BYOD devices are more expensive than devices purchased by an organization.","BYOD provides flexibility in where and how users can access network resources."],a:[3]},
{m:1,q:"What network feature would allow an employee to gain secure remote access to a company network?",c:["ACL","IPS","VPN","BYOD"],a:[2]},
{m:1,q:"What is the Internet?",c:["A network based on Ethernet technology.","It provides network access for mobile devices.","It provides connections through interconnected global networks.","A private network for an organization with LAN and WAN connections."],a:[2]},
{m:1,q:"What are two functions of end devices on a network? (Choose two.)",c:["They originate the data that flows through the network.","They direct data over alternate paths in the event of link failures.","They filter the flow of data to enhance security.","They are the interface between humans and the communication network.","They provide the channel over which the network message travels."],a:[0,3],multi:true},
{m:1,q:"In which scenario would the use of a WISP be recommended?",c:["An Internet cafe in a city","A farm in a rural area without wired broadband access","Any home with multiple wireless devices","An apartment in a building with cable access to the Internet"],a:[1]},
{m:1,q:"What characteristic enables a network to quickly grow to support new users without impacting existing users?",c:["Reliability","Scalability","Quality of service","Accessibility"],a:[1]},
{m:1,q:"Workers accidentally damaged a fiber optic cable but students only experienced a very short interruption. What characteristic is shown?",c:["Quality of service (QoS)","Scalability","Security","Fault tolerance","Integrity"],a:[3]},
{m:1,q:"What are two characteristics of a scalable network? (Choose two.)",c:["Easily overloaded with increased traffic","Grows in size without impacting existing users","Is not as reliable as a small network","Suitable for modular devices that allow for expansion","Offers limited number of applications"],a:[1,3],multi:true},
{m:1,q:"Which device determines the path that messages should take through internetworks?",c:["A router","A firewall","A web server","A DSL modem"],a:[0]},
{m:1,q:"Which two Internet connection options do not require physical cables run to the building? (Choose two.)",c:["DSL","Cellular","Satellite","Dialup","Dedicated leased line"],a:[1,2],multi:true},
{m:1,q:"What type of network must a home user access to do online shopping?",c:["An intranet","The Internet","An extranet","A local area network"],a:[1]},
{m:1,q:"Software secretly collects data about websites visited by users. Which type of threat is this?",c:["DoS attack","Identity theft","Spyware","Zero-day attack"],a:[2]},
{m:1,q:"Which term refers to a network that provides secure access to corporate offices by suppliers, customers and collaborators?",c:["Internet","Intranet","Extranet","Extendednet"],a:[2]},
{m:1,q:"A large corporation allows users to access network resources from personal laptops and smartphones. Which trend does this describe?",c:["Cloud computing","Online collaboration","Bring your own device","Video conferencing"],a:[2]},

{m:1,q:"Identify the Intermediary device.",c:["Printer","Hub","PC","Telephone"],a:[1]},
{m:2,q:"Which functionality is provided by DHCP?",c:["Automatic assignment of an IP address to each host","Remote switch management","Translation of IP addresses to domain names","End-to-end connectivity test"],a:[0]},
{m:2,q:"Which two functions are provided by the context-sensitive help feature of the Cisco IOS CLI? (Choose two.)",c:["Providing an error message when a wrong command is submitted","Displaying a list of all available commands within the current mode","Allowing the user to complete an abbreviated command with the TAB key","Determining which option, keyword, or argument is available for the entered command","Selecting the best command to accomplish a task"],a:[1,3],multi:true},
{m:2,q:"Which memory location on a Cisco router or switch stores the startup configuration file?",c:["RAM","ROM","NVRAM","Flash"],a:[2]},
{m:2,q:"To what subnet does the IP address 10.1.100.50 belong if a subnet mask of 255.255.0.0 is used?",c:["10.1.0.0","10.0.0.0","10.1.100.32","10.1.100.0"],a:[0]},

{m:2,q:"Which memory location on a Cisco router or switch will lose all content when the device is restarted?",c:["ROM","Flash","NVRAM","RAM"],a:[3]},
{m:2,q:"Why would a technician enter the command copy startup-config running-config?",c:["To remove all configurations from the switch","To save an active configuration to NVRAM","To copy an existing configuration into RAM","To make a changed configuration the new startup configuration"],a:[2]},
{m:2,q:"Which statement is true about the running configuration file in a Cisco IOS device?",c:["It affects the operation of the device immediately when modified.","It is stored in NVRAM.","It should be deleted using the erase running-config command.","It is automatically saved when the router reboots."],a:[0]},

{m:2,q:"What process is used to place one message inside another message for transfer from source to destination?",c:["Access control","Decoding","Encapsulation","Flow control"],a:[2]},

{m:2,q:"What are two benefits of using a layered network model? (Choose two.)",c:["It assists in protocol design.","It speeds up packet delivery.","It prevents designers from creating their own model.","It prevents technology in one layer from affecting other layers.","It ensures a device at one layer can function at the next higher layer."],a:[0,3],multi:true},
{m:2,q:"What is the purpose of protocols in data communications?",c:["Specifying the bandwidth of the channel for each type of communication","Specifying the device operating systems that will support the communication","Providing the rules required for a specific type of communication to occur","Dictating the content of the message sent during communication"],a:[2]},
{m:2,q:"Which logical address is used for delivery of data to a remote network?",c:["Destination MAC address","Destination IP address","Destination port number","Source MAC address","Source IP address"],a:[1]},
{m:2,q:"What is the general term used to describe a piece of data at any layer of a networking model?",c:["Frame","Packet","Protocol data unit","Segment"],a:[2]},
{m:2,q:"Which two protocols function at the internet layer? (Choose two.)",c:["POP","BOOTP","ICMP","IP","PPP"],a:[2,3],multi:true},
{m:2,q:"Which layer of the OSI model defines services to segment and reassemble data for individual communications between end devices?",c:["Application","Presentation","Session","Transport","Network"],a:[3]},

const modules = [...new Set(ALL_Q.map(q=>q.m))].sort((a,b)=>a-b);
let selectedModules = new Set(['all']);
let questions = [];
let current = 0;
let skipped = [];
let answers = {};
let isReviewingSkipped = false;
let reviewIndex = 0;

function modCount(m) { return ALL_Q.filter(q=>q.m===m).length; }

// Build home
function buildHome() {
  const g = document.getElementById('moduleGrid');
  let html = `<div class="mod-card all-card ${selectedModules.has('all')?'selected':''}" onclick="toggleModule('all')">
    <div class="mod-num">ALL</div>
    <div class="mod-label">All Modules</div>
    <div class="mod-count">${ALL_Q.length} questions</div>
  </div>`;
  modules.forEach(m=>{
    html+=`<div class="mod-card ${selectedModules.has(m)&&!selectedModules.has('all')?'selected':''}" onclick="toggleModule(${m})">
      <div class="mod-num">MOD ${m===0?'CP':m}</div>
      <div class="mod-label">${MOD_NAMES[m]}</div>
      <div class="mod-count">${modCount(m)} Qs</div>
    </div>`;
  });
  g.innerHTML = html;
}

function toggleModule(m) {
  if(m==='all') { selectedModules = new Set(['all']); }
  else {
    selectedModules.delete('all');
    if(selectedModules.has(m)) selectedModules.delete(m);
    else selectedModules.add(m);
    if(selectedModules.size===0) selectedModules = new Set(['all']);
  }
  buildHome();
}

function startQuiz() {
  let pool = selectedModules.has('all') ? ALL_Q : ALL_Q.filter(q=>selectedModules.has(q.m));
  questions = [...pool];
  current = 0; skipped = []; answers = {}; isReviewingSkipped = false; reviewIndex = 0;
  showScreen('quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goHome() { showScreen('home'); buildHome(); }

function renderQuestion() {
  const idx = isReviewingSkipped ? skipped[reviewIndex] : current;
  const q = questions[idx];
  const answered = answers[idx] !== undefined;
  const total = questions.length;
  const done = Object.keys(answers).length;
  const pct = Math.round((done/total)*100);

  document.getElementById('qCounter').textContent = `${done} / ${total} answered`;
  document.getElementById('progressFill').style.width = pct+'%';
  const sb = document.getElementById('skipBadge');
  if(skipped.length>0){ sb.style.display=''; sb.textContent=`${skipped.length} skipped`; }
  else sb.style.display='none';

  const multi = q.multi;
  const sel = answers[idx] ? answers[idx].selected : [];
  const submitted = answers[idx] ? answers[idx].submitted : false;

  let choicesHtml = q.c.map((ch,i)=>{
    let cls = 'choice-btn';
    if(submitted){
      if(q.a.includes(i)) cls+=' correct';
      else if(sel.includes(i)) cls+=' wrong';
    } else if(sel.includes(i)) cls+=' selected';
    return `<button class="${cls}" id="ch${i}" onclick="selectChoice(${idx},${i})" ${submitted?'disabled':''}>
      <span class="choice-letter">${LETTERS[i]}</span><span>${ch}</span>
    </button>`;
  }).join('');

  let feedbackHtml = '';
  if(submitted){
    const correct = q.a.every(x=>sel.includes(x))&&sel.every(x=>q.a.includes(x));
    feedbackHtml = `<div class="feedback-box ${correct?'correct':'wrong'}">${correct?'✓ Correct!':'✗ Incorrect. Correct answer'+(q.a.length>1?'s':'')+': '+q.a.map(x=>LETTERS[x]).join(', ')+'.'}</div>`;
  }

  let actionsHtml = '';
  if(!submitted){
    actionsHtml = `<div class="q-actions">
      <button class="q-btn primary" onclick="submitAnswer(${idx})">SUBMIT</button>
      <button class="q-btn skip" onclick="skipQuestion(${idx})">SKIP →</button>
    </div>`;
  } else {
    if(isReviewingSkipped){
      const hasMore = reviewIndex < skipped.length-1;
      actionsHtml = `<div class="q-actions">
        ${hasMore?`<button class="q-btn primary" onclick="nextSkipped()">NEXT SKIPPED →</button>`:''}
        <button class="q-btn secondary" onclick="goToResults()">SEE RESULTS</button>
      </div>`;
    } else {
      const nextUnanswered = findNextUnanswered(idx+1);
      actionsHtml = `<div class="q-actions">
        ${nextUnanswered!==-1?`<button class="q-btn primary" onclick="goToQ(${nextUnanswered})">NEXT →</button>`:''}
        ${skipped.length>0?`<button class="q-btn skip" onclick="startReviewSkipped()">REVIEW SKIPPED (${skipped.length})</button>`:''}
        <button class="q-btn secondary" onclick="goToResults()">SEE RESULTS</button>
      </div>`;
    }
  }

  let skippedPanel = '';
  if(skipped.length>0&&!isReviewingSkipped&&!submitted){
    const items = skipped.map((si,ri)=>`<span class="skipped-item" onclick="jumpToSkipped(${ri})">Q${si+1}</span>`).join('');
    skippedPanel = `<div class="skipped-panel"><h3>SKIPPED QUESTIONS</h3><div class="skipped-list">${items}</div></div>`;
  }

  document.getElementById('quizBody').innerHTML = `
    <div class="fade-in">
      ${skippedPanel}
      <div class="q-module-tag">MODULE ${q.m===0?'CHECKPOINT':q.m} — ${MOD_NAMES[q.m]} &nbsp; Q${idx+1}</div>
      ${isReviewingSkipped?'<div class="q-skipped-tag">⚑ RETURNING TO SKIPPED QUESTION</div>':''}
      <div class="q-text">${q.q}</div>
      ${multi?'<div class="multi-hint">⚑ Select all that apply</div>':''}
      <div class="choices">${choicesHtml}</div>
      ${feedbackHtml}
      ${actionsHtml}
    </div>`;
}

function selectChoice(idx, i){
  const q = questions[idx];
  if(!answers[idx]) answers[idx] = {selected:[], submitted:false};
  if(answers[idx].submitted) return;
  if(q.multi){
    const s = answers[idx].selected;
    if(s.includes(i)) answers[idx].selected = s.filter(x=>x!==i);
    else answers[idx].selected.push(i);
  } else {
    answers[idx].selected = [i];
  }
  renderQuestion();
}

function submitAnswer(idx){
  if(!answers[idx]||answers[idx].selected.length===0) return;
  answers[idx].submitted = true;
  renderQuestion();
}

function skipQuestion(idx){
  if(!skipped.includes(idx)) skipped.push(idx);
  const next = findNextUnanswered(idx+1);
  if(next!==-1){ current=next; isReviewingSkipped=false; }
  else if(skipped.filter(s=>!answers[s]?.submitted).length>0){
    startReviewSkipped(); return;
  } else { goToResults(); return; }
  renderQuestion();
}

function findNextUnanswered(from){
  for(let i=from;i<questions.length;i++){
    if(!skipped.includes(i)&&!answers[i]?.submitted) return i;
  }
  return -1;
}

function goToQ(idx){ current=idx; isReviewingSkipped=false; renderQuestion(); }

function startReviewSkipped(){
  const pending = skipped.filter(s=>!answers[s]?.submitted);
  if(pending.length===0){goToResults();return;}
  skipped = pending;
  isReviewingSkipped=true; reviewIndex=0; renderQuestion();
}

function nextSkipped(){
  reviewIndex++;
  if(reviewIndex>=skipped.length){goToResults();return;}
  renderQuestion();
}

function jumpToSkipped(ri){ isReviewingSkipped=true; reviewIndex=ri; renderQuestion(); }

function goToResults(){
  showScreen('results');
  buildResults();
}

function buildResults(){
  const total = questions.length;
  const answeredKeys = Object.keys(answers).filter(k=>answers[k].submitted).map(Number);
  let correct=0, wrong=[], skippedFinal=[];
  for(let i=0;i<total;i++){
    if(answers[i]&&answers[i].submitted){
      const q=questions[i]; const sel=answers[i].selected;
      if(q.a.every(x=>sel.includes(x))&&sel.every(x=>q.a.includes(x))) correct++;
      else wrong.push(i);
    } else { skippedFinal.push(i); }
  }
  const answered = answeredKeys.length;
  const pct = answered>0?Math.round((correct/answered)*100):0;
  let scoreColor = pct>=90?'#38e5a0':pct>=70?'#5b8cff':pct>=50?'#ffb547':'#ff5c6a';

  // module breakdown for filter
  const wrongMods = [...new Set(wrong.map(i=>questions[i].m))];

  let wrongHtml = wrong.length>0 ? `
    <div class="results-section-title">INCORRECT ANSWERS — ${wrong.length}</div>
    <div class="mod-filter-row" id="filterRow">
      <button class="mf-btn active" onclick="filterWrong('all',this)">All</button>
      ${wrongMods.map(m=>`<button class="mf-btn" onclick="filterWrong(${m},this)">Mod ${m===0?'CP':m}</button>`).join('')}
    </div>
    <div class="review-list" id="wrongList">
      ${wrong.map(i=>{
        const q=questions[i]; const sel=answers[i].selected;
        return `<div class="review-card wrong-card" data-mod="${q.m}">
          <div class="review-qnum">MODULE ${q.m===0?'CHECKPOINT':q.m} · QUESTION ${i+1}</div>
          <div class="review-q">${q.q}</div>
          <div class="review-your">✗ Your answer: ${sel.map(x=>LETTERS[x]).join(', ')} — ${sel.map(x=>q.c[x]).join(' / ')}</div>
          <div class="review-correct">✓ Correct: ${q.a.map(x=>LETTERS[x]).join(', ')} — ${q.a.map(x=>q.c[x]).join(' / ')}</div>
        </div>`;
      }).join('')}
    </div>` : `<div class="results-section-title">INCORRECT ANSWERS</div><p style="color:var(--muted);font-size:14px;margin-bottom:2rem;">None! Perfect score on answered questions.</p>`;

  let skippedHtml = skippedFinal.length>0 ? `
    <div class="results-section-title" style="margin-top:2rem;">SKIPPED / UNANSWERED — ${skippedFinal.length}</div>
    <div class="review-list">
      ${skippedFinal.map(i=>{
        const q=questions[i];
        return `<div class="review-card skipped-card">
          <div class="review-qnum">MODULE ${q.m===0?'CHECKPOINT':q.m} · QUESTION ${i+1}</div>
          <div class="review-q">${q.q}</div>
          <div class="review-skipped-label">⚑ Not answered</div>
          <div class="review-correct" style="margin-top:6px;">Correct: ${q.a.map(x=>LETTERS[x]).join(', ')} — ${q.a.map(x=>q.c[x]).join(' / ')}</div>
        </div>`;
      }).join('')}
    </div>` : '';

  document.getElementById('resultsWrap').innerHTML = `
    <div class="results-header">
      <div class="results-title">QUIZ COMPLETE</div>
      <div class="results-score-big" style="color:${scoreColor}">${pct}%</div>
      <div class="results-pct">${correct} correct out of ${answered} answered</div>
      <div class="score-cards">
        <div class="score-card correct"><div class="score-card-num">${correct}</div><div class="score-card-lbl">Correct</div></div>
        <div class="score-card wrong"><div class="score-card-num">${wrong.length}</div><div class="score-card-lbl">Incorrect</div></div>
        <div class="score-card skipped"><div class="score-card-num">${skippedFinal.length}</div><div class="score-card-lbl">Skipped</div></div>
        <div class="score-card"><div class="score-card-num">${answered}</div><div class="score-card-lbl">Answered</div></div>
      </div>
    </div>
    ${wrongHtml}
    ${skippedHtml}
    <div class="results-actions">
      <button class="res-btn primary" onclick="startQuiz()">RETRY QUIZ</button>
      <button class="res-btn secondary" onclick="goHome()">CHANGE MODULES</button>
    </div>`;
}

function filterWrong(mod, btn){
  document.querySelectorAll('#filterRow .mf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#wrongList .review-card').forEach(card=>{
    if(mod==='all'||card.dataset.mod==mod) card.style.display='';
    else card.style.display='none';
  });
}

buildHome();
</script>
</body>
</html>
